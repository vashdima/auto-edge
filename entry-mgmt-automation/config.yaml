# Config template for entry_mgmt automation (scanner + backend).
# Maps to inputs in entry_mgmt.pine. Only params that affect scan/calculations are included.
# UI-only (showHighlight, colors, manual toggles, alerts) are omitted.

# --- Scan window(s) (Oanda fetch adds buffer before each window "from" for MA warm-up) ---
scan:
  windows:
    - from: "2020-01-10T00:00:00Z"
      to:   "2026-03-28T23:59:59Z"

# --- Run (B2.4: named run; same key overwrites prior raw_trades) ---
run:
  key: "test"
  overwrite: true

# --- Timeframes (entry = chart TF; context = HTF trend; validation = validation TF) ---
# Oanda granularity mapping: M1, M5, M15, M30, H1, H4, D, W
timeframes:
  # LTF entries
  # entry:     "M5"   # chart TF (Pine: chart period; here set explicitly)
  # validation: "H2"    # Pine: validationTF "Validation timeframe"
  # context:   "W"     # Pine: htfTrendTF "Trend timeframe (Context)"

  # MTF entries
  # entry:     "M30"   # chart TF (Pine: chart period; here set explicitly)
  # validation: "H3"    # Pine: validationTF "Validation timeframe"
  # context:   "W"     # Pine: htfTrendTF "Trend timeframe (Context)"

  # HTF entries
  entry:     "H1"   # chart TF (Pine: chart period; here set explicitly)
  validation: "D"    # Pine: validationTF "Validation timeframe"
  context:   "W"     # Pine: htfTrendTF "Trend timeframe (Context)"

# --- Entry Detection (Pine: lines 6-10) ---
entry_detection:
  slowEMAPeriod:       100  # slow = long period (smooth), min 1
  mediumEMAPeriod:      50  # Pine default 50, min 1
  fastEMAPeriod:        20  # fast = short period (breakout EMA), min 1
  maxCandlesAfterBreak: 5  # Pine default 5, min 1, max 20
  maxCandlesAfterPause: 20  # Cancel PENDING if price does not cross entry within this many bars
  maxDistanceFromEMA:  2.0 # Pine default 2.0, min 0.1 step 0.1 (ATR multiples)
  contextReEnabled: false      # RE context regime gate; disabled keeps legacy behavior
  contextReAtrMultiplier: 1.3  # Trigger threshold for (ctx_high - ctx_low) / ctx_atr
  validationReEnabled: true  # RE validation regime gate; disabled keeps legacy behavior
  validationReAtrMultiplier: 1.3  # Trigger threshold for (val_high - val_low) / val_atr
  # Enrich score range (optional): only allow entry when enrich_score is in [min, max] (inclusive). Omit both to disable.
  # enrichScoreMin: 2
  # enrichScoreMax: 20

# --- Risk Management (Pine: lines 20-23) ---
risk_management:
  atrPeriod:     14   # Pine default 14, min 1
  atrMultiplier: 0.5  # Pine default 1.5, min 0.1 step 0.1 (SL = entry - atr * this)
  rrBreakEven:   1.3  # Pine default 1.0, min 0.1 step 0.1 (R:R to trigger BE)
  rrTakeProfit:  4.0  # Pine default 4.0, min 0.1 step 0.1 (R:R for TP)

# --- MTF fetch (Oanda): parallelize symbols; each symbol fetches entry/context/validation in parallel ---
# Higher values speed up multi-symbol runs but may trigger Oanda rate limits (429); client retries 429 with backoff.
mtf_fetch:
  max_symbol_workers: 1   # default 1 (symbols sequential); try 2–8 if you have many symbols

# --- Optional: symbols to scan (if not provided, a default list may be used) ---
symbols:
  - "XAU_USD"
  - "USD_JPY"
  - "GBP_USD"
  - "AUD_USD"
  - "USD_CAD"